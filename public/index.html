<!DOCTYPE html>
<html>
<head>
  <title>Mini Among Us</title>
  <style>
    body { margin:0; background:#111; overflow:hidden; }
    canvas { display:block; margin:auto; background:#1e1e1e; }
    #taskUI {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:#222;
      padding:10px 20px;
      border-radius:8px;
      color:white;
      display:none;
    }
  </style>
</head>
<body>

<div id="taskUI">Press E to complete task</div>
<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const taskUI = document.getElementById("taskUI");

const socket = new WebSocket(
  location.protocol === "https:"
    ? `wss://${location.host}`
    : `ws://${location.host}`
);

let myId = null;
const players = {};
const keys = {};
const speed = 3;

const walls = [
  {x:200,y:0,w:20,h:400},
  {x:600,y:200,w:20,h:400}
];

const tasks = [
  {x:150,y:150,done:false},
  {x:850,y:450,done:false}
];

document.addEventListener("keydown", e => {
  keys[e.key] = true;

  if (e.key === "e") attemptTask();
  if (e.key === "q") attemptKill();
});
document.addEventListener("keyup", e=>keys[e.key]=false);

socket.onmessage = msg => {
  const data = JSON.parse(msg.data);

  if (data.type === "init") {
    myId = data.id;
    Object.assign(players, data.players);
  }

  if (data.type === "rolesAssigned") {
    for (let id in data.players) {
      players[id].role = data.players[id].role;
    }
  }

  if (data.type === "update") {
    players[data.id] = data.position;
  }

  if (data.type === "killed") {
    if (players[data.targetId]) {
      players[data.targetId].alive = false;
    }
  }

  if (data.type === "leave") {
    delete players[data.id];
  }
};

function sendPosition(x,y){
  socket.send(JSON.stringify({
    type:"position",
    position:{x,y}
  }));
}

function collides(x,y){
  for(let wall of walls){
    if(x>wall.x && x<wall.x+wall.w &&
       y>wall.y && y<wall.y+wall.h){
       return true;
    }
  }
  return false;
}

function attemptTask(){
  const p = players[myId];
  for(let task of tasks){
    const dist = Math.hypot(p.x-task.x,p.y-task.y);
    if(dist<40 && !task.done){
      task.done=true;
      taskUI.style.display="none";
    }
  }
}

function drawCrewmate(x, y, color, name) {

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(x, y, 22, 28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Backpack
  ctx.fillStyle = shadeColor(color, -20);
  ctx.beginPath();
  ctx.ellipse(x - 18, y + 5, 10, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Visor base
  ctx.fillStyle = "#aee3ff";
  ctx.beginPath();
  ctx.ellipse(x + 6, y - 5, 16, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Visor shine
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  ctx.beginPath();
  ctx.ellipse(x + 10, y - 8, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Name
  ctx.fillStyle = "white";
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.fillText(name, x, y - 40);
}

  function shadeColor(color, percent) {
  let f = parseInt(color.slice(1), 16),
      t = percent < 0 ? 0 : 255,
      p = percent < 0 ? percent * -1 : percent,
      R = f >> 16,
      G = f >> 8 & 0x00FF,
      B = f & 0x0000FF;
  return "#" + (0x1000000 +
    (Math.round((t - R) * p / 100) + R) * 0x10000 +
    (Math.round((t - G) * p / 100) + G) * 0x100 +
    (Math.round((t - B) * p / 100) + B)
  ).toString(16).slice(1);
}

function draw(){
  ctx.fillStyle = "#0b0f1a";
ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (myId && players[myId]?.role) {
  ctx.fillStyle = players[myId].role === "impostor" ? "red" : "white";
  ctx.font = "bold 20px Arial";
  ctx.textAlign = "left";
  ctx.fillText(
    players[myId].role.toUpperCase(),
    20,
    30
  );
}

// subtle grid
ctx.strokeStyle = "rgba(255,255,255,0.05)";
for (let i = 0; i < canvas.width; i += 40) {
  ctx.beginPath();
  ctx.moveTo(i, 0);
  ctx.lineTo(i, canvas.height);
  ctx.stroke();
}
for (let i = 0; i < canvas.height; i += 40) {
  ctx.beginPath();
  ctx.moveTo(0, i);
  ctx.lineTo(canvas.width, i);
  ctx.stroke();
}

  // Draw walls
  ctx.fillStyle="#555";
  walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

  // Draw tasks
  tasks.forEach(task=>{
    ctx.fillStyle=task.done?"green":"yellow";
    ctx.beginPath();
    ctx.arc(task.x,task.y,10,0,Math.PI*2);
    ctx.fill();
  });

  if (myId && players[myId] && players[myId].alive) {
    let p = players[myId];
    let newX = p.x;
    let newY = p.y;

    if(keys["ArrowUp"]) newY-=speed;
    if(keys["ArrowDown"]) newY+=speed;
    if(keys["ArrowLeft"]) newX-=speed;
    if(keys["ArrowRight"]) newX+=speed;

    if(!collides(newX,newY)){
      p.x=newX;
      p.y=newY;
      sendPosition(p.x,p.y);
    }

    // Task UI trigger
    let nearTask=false;
    for(let task of tasks){
      if(Math.hypot(p.x-task.x,p.y-task.y)<40 && !task.done){
        nearTask=true;
      }
    }
    taskUI.style.display=nearTask?"block":"none";
  }

  for (let id in players) {
  let color = id == myId ? "#c51111" : "#1177cc";
  if (!players[id].alive) color = "#555555";

  drawCrewmate(
    players[id].x,
    players[id].y,
    color,
    id
  );
}

  requestAnimationFrame(draw);
}

  function attemptKill() {
  const me = players[myId];
  if (!me || me.role !== "impostor" || !me.alive) return;

  let closestId = null;
  let closestDist = Infinity;

  for (let id in players) {
    if (id === myId) continue;
    if (!players[id].alive) continue;

    const dist = Math.hypot(
      me.x - players[id].x,
      me.y - players[id].y
    );

    if (dist < 50 && dist < closestDist) {
      closestDist = dist;
      closestId = id;
    }
  }

  if (closestId) {
    socket.send(JSON.stringify({
      type: "kill",
      targetId: closestId
    }));
  }
}

let killCooldown = false;

function attemptKill() {
  const me = players[myId];
  if (!me || me.role !== "impostor" || !me.alive || killCooldown) return;

  let closestId = null;
  let closestDist = Infinity;

  for (let id in players) {
    if (id === myId) continue;
    if (!players[id].alive) continue;

    const dist = Math.hypot(me.x - players[id].x, me.y - players[id].y);
    if (dist < 50 && dist < closestDist) {
      closestDist = dist;
      closestId = id;
    }
  }

  if (closestId) {
    socket.send(JSON.stringify({ type: "kill", targetId: closestId }));
    killCooldown = true;
    setTimeout(() => killCooldown = false, 3000); 
  }
}

  draw();
  
</script>
</body>
</html>
